<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockPy Studio — Dev Harness</title>
  </head>
  <body>
    <!-- Static dev harness: mounts the app from a hand-written BootConfig,
         no server required (DEVELOPMENT_PLAN.md §0.1). Mirrors the spec §5.2
         bootstrapping contract. -->
    <span class="delete-on-load"
      >Loading! Please wait. If this doesn't load, and you are using Safari, then please stop
      using Safari!</span
    >
    <div id="blockpy-root"></div>
    <script type="application/json" id="blockpy-config">
      {
        "urls": {
          "loadAssignment": "/api/load_assignment",
          "loadHistory": "/api/load_history",
          "saveFile": "/api/save_file",
          "logEvent": "/api/log_event",
          "updateSubmission": "/api/update_submission",
          "updateSubmissionStatus": "/api/update_submission_status",
          "listUploadedFiles": "/api/list_files",
          "uploadFile": "/api/upload_file",
          "renameFile": "/api/rename_file",
          "downloadFile": "/api/download_file",
          "estimateGroupDuration": "/api/estimate_group_duration",
          "startAssignment": "/api/start_assignment",
          "importDatasets": "https://corgis-edu.github.io/corgis/datasets/"
        },
        "user": {
          "id": 1,
          "name": "Dev Student",
          "role": "learner",
          "courseId": 1
        },
        "assignment": {
          "currentAssignmentId": 101,
          "assignmentGroupId": 11,
          "typeIndex": {
            "quiz": [102, 104],
            "reading": [103],
            "textbook": [105],
            "java": [106],
            "typescript": [108],
            "explain": [],
            "blockpy": [101, 107]
          }
        },
        "group": {
          "assignments": [
            { "id": 101, "name": "Hello World", "url": "#101", "subordinate": false, "hidden": false, "correct": false },
            { "id": 104, "name": "Quiz: All Question Types", "url": "#104", "subordinate": false, "hidden": false, "correct": false },
            { "id": 105, "name": "Textbook: Chapter 1", "url": "#105", "subordinate": false, "hidden": false, "correct": false },
            { "id": 106, "name": "Java Legacy Problem", "url": "#106", "subordinate": false, "hidden": false, "correct": false },
            { "id": 108, "name": "Kettle: TypeScript Intro", "url": "#108", "subordinate": false, "hidden": false, "correct": false },
            { "id": 107, "name": "Plotting Temperatures", "url": "#107", "subordinate": false, "hidden": false, "correct": false },
            { "id": 103, "name": "Reading: Variables", "url": "#103", "subordinate": false, "hidden": false, "correct": false },
            { "id": 102, "name": "Quiz: Variables", "url": "#102", "subordinate": true, "hidden": false, "correct": false }
          ],
          "anySecretive": false,
          "currentAssignmentId": 101
        },
        "display": { "instructor": false, "readOnly": false, "embed": false },
        "passcodeProtected": false,
        "sessionStartTime": null,
        "paths": {
          "blocklyMedia": "/blockly-media/",
          "emojiProxy": "/emoji/",
          "pyodideIndexURL": "https://cdn.jsdelivr.net/pyodide/v314.0.2/full/"
        },
        "settings": {},
        "corgisUrl": "https://corgis-edu.github.io/corgis/datasets/"
      }
    </script>
    <script type="module" src="/src/dev.ts"></script>
  </body>
</html>
